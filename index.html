<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMI Smart Monitoring</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>MONITORING KUALITAS LINGKUNGAN</h1>
        <div class="status-koneksi"><i class="fa-solid fa-circle fa-fade" style="color: #00ff66; font-size: 10px; margin-right: 5px;"></i> Live Data Active</div>
    </div>

    <div class="dashboard">
        <div class="panel" id="panel_suhu">
            <div class="panel-icon"><i class="fa-solid fa-temperature-half"></i></div>
            <div class="panel-title">TEMPERATURE</div>
            <div id="suhu_val" class="value-display">--.-</div>
            <div style="font-size: 20px; color: #888;">°C</div>
            <div id="status_teks" style="margin-top: 15px; font-weight: bold; letter-spacing: 1px;">-</div>
        </div>

        <div class="panel status-lembab">
            <div class="panel-icon" style="color: #00f0ff;"><i class="fa-solid fa-droplet"></i></div>
            <div class="panel-title">HUMIDITY</div>
            <div id="lembab_val" class="value-display">--.-</div>
            <div style="font-size: 20px; color: #888;">%</div>
        </div>
    </div>

    <div class="export-card">
        <div class="export-title">Simpan Rekapan</div>
        <p>Pilih rentang waktu yang ingin disimpan, lalu ekspor hasil pembacaan ke file CSV.</p>
        <div class="export-controls">
            <select id="export_range">
                <option value="1h">1 Jam</option>
                <option value="24h">1 Hari</option>
                <option value="7d">7 Hari</option>
                <option value="30d">1 Bulan</option>
            </select>
            <button id="export_csv_btn">Ekspor CSV</button>
        </div>
        <div id="export_status" class="export-status">Data akan disimpan dalam file CSV.</div>
    </div>

    <div class="footer">
        Last Sync: <span id="waktu_val">Menghubungkan ke Database...</span>
    </div>

    <script type="module" src="script.js"></script>

</body>
</html>
